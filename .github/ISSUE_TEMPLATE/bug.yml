name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Configure MCP server with ...
        2. Call tool `xxx` with ...
        3. See error ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Package version
      placeholder: "0.1.6"
    validations:
      required: true

  - type: dropdown
    id: client
    attributes:
      label: MCP Client
      options:
        - Claude Code
        - Cursor
        - Codex CLI
        - Gemini CLI
        - Other
    validations:
      required: true
